<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISC2 CC — 14-Day Cyber Shield</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a14;
    --surface: #0a1628;
    --surface2: #0f1f3a;
    --border: #1a3a5c;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #39ff14;
    --text: #e0eeff;
    --muted: #5a7a9a;
    --danger: #ff3355;
    --success: #39ff14;
    --warning: #ffcc00;
    --card-glow: 0 0 30px rgba(0,212,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(0,212,255,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(255,107,53,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    animation: bgPulse 8s ease-in-out infinite alternate;
  }

  @keyframes bgPulse {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  .app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 20px; }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 40px 20px 30px;
    position: relative;
  }

  .shield-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 20px rgba(0,212,255,0.6));
    animation: shieldPulse 3s ease-in-out infinite;
  }

  @keyframes shieldPulse {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(0,212,255,0.6)); }
    50% { filter: drop-shadow(0 0 40px rgba(0,212,255,1)); }
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), #ffffff, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ── PROGRESS BAR ── */
  .progress-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: var(--card-glow);
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .progress-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .progress-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    color: var(--muted);
  }

  .progress-track {
    background: rgba(255,255,255,0.05);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 100px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 12px rgba(0,212,255,0.5);
  }

  .day-dots {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .day-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    transition: all 0.2s;
  }

  .day-dot.completed {
    background: linear-gradient(135deg, var(--accent3), #00aa00);
    border-color: var(--accent3);
    color: #000;
    box-shadow: 0 0 10px rgba(57,255,20,0.4);
  }

  .day-dot.active {
    background: linear-gradient(135deg, var(--accent), #0088cc);
    border-color: var(--accent);
    color: #000;
    box-shadow: 0 0 14px rgba(0,212,255,0.6);
    animation: activePulse 2s ease-in-out infinite;
  }

  @keyframes activePulse {
    0%, 100% { box-shadow: 0 0 14px rgba(0,212,255,0.6); }
    50% { box-shadow: 0 0 24px rgba(0,212,255,1); }
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    box-shadow: var(--card-glow);
    transition: transform 0.2s, border-color 0.2s;
  }

  .stat-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }

  .stat-val {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-lbl {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stat-card.cyan .stat-val { color: var(--accent); }
  .stat-card.orange .stat-val { color: var(--accent2); }
  .stat-card.green .stat-val { color: var(--accent3); }
  .stat-card.red .stat-val { color: var(--danger); }

  /* ── DAY SELECTOR ── */
  .day-selector {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  @media (max-width: 600px) {
    .days-grid { grid-template-columns: repeat(4, 1fr); }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }

  .day-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    color: var(--text);
  }

  .day-btn:hover {
    border-color: var(--accent);
    background: rgba(0,212,255,0.08);
    transform: translateY(-2px);
  }

  .day-btn.active-day {
    border-color: var(--accent);
    background: rgba(0,212,255,0.15);
    box-shadow: 0 0 16px rgba(0,212,255,0.2);
  }

  .day-btn .day-num {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    display: block;
  }

  .day-btn .day-topic {
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.3;
  }

  /* ── CONTENT AREA ── */
  .content-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 24px;
    box-shadow: var(--card-glow);
  }

  .content-header {
    background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(255,107,53,0.05));
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .day-badge {
    background: linear-gradient(135deg, var(--accent), #0088cc);
    color: #000;
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 6px;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .content-title {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }

  .content-body { padding: 24px; }

  /* ── TOPIC CARDS ── */
  .topic-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .topic-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .topic-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .topic-card:hover { border-color: var(--accent); transform: translateX(4px); }
  .topic-card:hover::before { opacity: 1; }
  .topic-card.expanded { border-color: var(--accent); background: rgba(0,212,255,0.05); }
  .topic-card.expanded::before { opacity: 1; }

  .topic-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .topic-name {
    font-weight: 600;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .topic-icon { font-size: 1.2rem; }

  .topic-toggle {
    color: var(--accent);
    font-size: 1rem;
    transition: transform 0.3s;
  }

  .topic-card.expanded .topic-toggle { transform: rotate(180deg); }

  .topic-content {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 0.9rem;
    line-height: 1.8;
    color: rgba(224,238,255,0.85);
  }

  .topic-card.expanded .topic-content { display: block; }

  /* ── CONCEPT BOXES ── */
  .concept-box {
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 10px;
    padding: 14px 16px;
    margin: 12px 0;
  }

  .concept-box.orange {
    background: rgba(255,107,53,0.05);
    border-color: rgba(255,107,53,0.2);
  }

  .concept-box.green {
    background: rgba(57,255,20,0.05);
    border-color: rgba(57,255,20,0.2);
  }

  .concept-box.red {
    background: rgba(255,51,85,0.05);
    border-color: rgba(255,51,85,0.2);
  }

  .box-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .concept-box.orange .box-label { color: var(--accent2); }
  .concept-box.green .box-label { color: var(--accent3); }
  .concept-box.red .box-label { color: var(--danger); }

  /* keyword highlight */
  .kw {
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9em;
    background: rgba(0,212,255,0.1);
    padding: 1px 5px;
    border-radius: 4px;
  }

  .kw.orange { color: var(--accent2); background: rgba(255,107,53,0.1); }
  .kw.green { color: var(--accent3); background: rgba(57,255,20,0.1); }
  .kw.red { color: var(--danger); background: rgba(255,51,85,0.1); }

  /* table */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 0.85rem;
  }

  .data-table th {
    background: rgba(0,212,255,0.1);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 1px;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .data-table td {
    padding: 9px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: rgba(224,238,255,0.8);
    vertical-align: top;
  }

  .data-table tr:hover td { background: rgba(0,212,255,0.03); }

  /* mnemonic */
  .mnemonic {
    background: linear-gradient(135deg, rgba(255,204,0,0.08), rgba(255,107,53,0.08));
    border: 1px solid rgba(255,204,0,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    margin: 10px 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    color: var(--warning);
  }

  /* ── MCQ SECTION ── */
  .mcq-section { margin-top: 24px; }

  .mcq-header {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .mcq-header::before {
    content: '◉';
    color: var(--accent2);
    animation: blink 1.5s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .mcq-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .mcq-card.answered-correct { border-color: var(--success); background: rgba(57,255,20,0.04); }
  .mcq-card.answered-wrong { border-color: var(--danger); background: rgba(255,51,85,0.04); }

  .q-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .q-text {
    font-size: 0.92rem;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 14px;
    color: var(--text);
  }

  .options { display: flex; flex-direction: column; gap: 8px; }

  .option {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.88rem;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    color: var(--text);
    text-align: left;
    width: 100%;
  }

  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(0,212,255,0.06);
  }

  .option:disabled { cursor: default; }

  .option.correct { border-color: var(--success); background: rgba(57,255,20,0.1); color: var(--success); }
  .option.wrong { border-color: var(--danger); background: rgba(255,51,85,0.1); color: var(--danger); }
  .option.reveal { border-color: var(--success); background: rgba(57,255,20,0.06); }

  .opt-letter {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.7;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .explanation {
    display: none;
    margin-top: 12px;
    padding: 12px 14px;
    background: rgba(0,212,255,0.05);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    font-size: 0.84rem;
    line-height: 1.7;
    color: rgba(224,238,255,0.8);
    animation: fadeIn 0.3s ease;
  }

  .explanation.show { display: block; }
  .explanation.wrong-exp { border-color: var(--danger); background: rgba(255,51,85,0.05); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .exp-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* ── WEAK AREAS ── */
  .weak-area-panel {
    background: var(--surface);
    border: 1px solid rgba(255,51,85,0.3);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }

  .weak-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.88rem;
  }

  .weak-item:last-child { border-bottom: none; }

  .weak-bar-wrap {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
  }

  .weak-bar {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--danger), var(--warning));
  }

  .weak-pct {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    min-width: 36px;
    text-align: right;
  }

  /* ── RESULTS ── */
  .score-display {
    text-align: center;
    padding: 20px;
    background: var(--surface2);
    border-radius: 12px;
    margin-top: 16px;
  }

  .score-num {
    font-family: 'Orbitron', monospace;
    font-size: 3rem;
    font-weight: 900;
  }

  .score-num.great { color: var(--success); text-shadow: 0 0 30px rgba(57,255,20,0.5); }
  .score-num.ok { color: var(--warning); text-shadow: 0 0 30px rgba(255,204,0,0.5); }
  .score-num.bad { color: var(--danger); text-shadow: 0 0 30px rgba(255,51,85,0.5); }

  .score-msg {
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
    margin-top: 8px;
    font-size: 0.85rem;
    letter-spacing: 1px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--surface2);
    padding: 4px;
    border-radius: 10px;
  }

  .tab {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 8px 12px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab.active {
    background: var(--surface);
    color: var(--accent);
    border: 1px solid var(--border);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0088cc);
    color: #000;
  }

  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.4); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: rgba(255,51,85,0.15);
    color: var(--danger);
    border: 1px solid rgba(255,51,85,0.3);
  }

  .action-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  /* ── DIAGRAM ── */
  .diagram {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.9;
    color: var(--accent);
    margin: 12px 0;
    white-space: pre;
    overflow-x: auto;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 0.85rem;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    z-index: 1000;

// Fill remaining days with placeholder data
for (let d = 4; d <= 14; d++) {
  const titles = {
    4: "Networking Fundamentals", 5: "Ports & Protocols",
    6: "Network Attacks", 7: "Network Defense",
    8: "Network Security Infrastructure", 9: "Data Security",
    10: "Security Operations", 11: "Security Policies",
    12: "Business Continuity", 13: "Complete Revision",
    14: "Full Mock Exam"
  };
  CURRICULUM[d] = {
    title: titles[d],
    topics: [{
      icon: "🔒",
      name: `${titles[d]} — Coming Soon`,
      content: `<div class="concept-box"><div class="box-label">Study Note</div>Say <strong>"NEXT DAY"</strong> in the chat to unlock the next day's full lesson! Study Day ${d-1} thoroughly first.<br><br>Each day builds on the previous — don't skip ahead!</div>`
    }],
    mcqs: []
  };
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let state = {
  currentDay: 1,
  answers: {},       // { "day-qIdx": chosenIdx }
  scores: {},        // { day: score }
  weakTopics: {},    // { topicName: wrongCount }
  totalAnswered: 0
};

// Try to load from localStorage
try {
  const saved = localStorage.getItem('cc_exam_state');
  if (saved) state = JSON.parse(saved);
} catch(e) {}

function saveState() {
  try { localStorage.setItem('cc_exam_state', JSON.stringify(state)); } catch(e) {}
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  buildDayDots();
  buildDaysGrid();
  renderDay(state.currentDay);
  updateStats();
}

function buildDayDots() {
  const container = document.getElementById('dayDots');
  container.innerHTML = '';
  for (let d = 1; d <= 14; d++) {
    const dot = document.createElement('div');
    dot.className = 'day-dot' + (d === state.currentDay ? ' active' : (state.scores[d] !== undefined ? ' completed' : ''));
    dot.textContent = d;
    dot.onclick = () => selectDay(d);
    container.appendChild(dot);
  }
  document.getElementById('progressFill').style.width = ((state.currentDay / 14) * 100) + '%';
  document.getElementById('progressCount').textContent = `Day ${state.currentDay} of 14`;
}

function buildDaysGrid() {
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  const shortTitles = {
    1:"CIA Triad",2:"Risk Mgmt",3:"Access Ctrl",4:"Networking",5:"Ports",
    6:"Attacks",7:"Defense",8:"Net Infra",9:"Data Sec",10:"Sec Ops",
    11:"Policies",12:"BCP/DR",13:"Revision",14:"Mock Exam"
  };
  for (let d = 1; d <= 14; d++) {
    const btn = document.createElement('div');
    btn.className = 'day-btn' + (d === state.currentDay ? ' active-day' : '');
    btn.innerHTML = `<span class="day-num">${d}</span><div class="day-topic">${shortTitles[d]}</div>`;
    btn.onclick = () => selectDay(d);
    grid.appendChild(btn);
  }
}

function selectDay(d) {
  state.currentDay = d;
  saveState();
  buildDayDots();
  buildDaysGrid();
  renderDay(d);
  updateStats();
  switchTab('learn');
}

// ─────────────────────────────────────────────
// RENDER DAY
// ─────────────────────────────────────────────
function renderDay(d) {
  const day = CURRICULUM[d];
  document.getElementById('dayBadge').textContent = `DAY ${d}`;
  document.getElementById('contentTitle').textContent = day.title;
  document.getElementById('mcqDayNum').textContent = d;

  // Topics
  const topicList = document.getElementById('topicList');
  topicList.innerHTML = '';
  day.topics.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.id = `topic-${d}-${i}`;
    card.innerHTML = `
      <div class="topic-header" onclick="toggleTopic(${d},${i})">
        <div class="topic-name"><span class="topic-icon">${t.icon}</span>${t.name}</div>
        <div class="topic-toggle">▾</div>
      </div>
      <div class="topic-content">${t.content}</div>`;
    topicList.appendChild(card);
  });

  // MCQs
  renderMCQs(d);
  renderWeakAreas();
}

function toggleTopic(d, i) {
  const card = document.getElementById(`topic-${d}-${i}`);
  card.classList.toggle('expanded');
}

// ─────────────────────────────────────────────
// MCQ
// ─────────────────────────────────────────────
function renderMCQs(d) {
  const container = document.getElementById('mcqContainer');
  container.innerHTML = '';
  const day = CURRICULUM[d];

  if (!day.mcqs || day.mcqs.length === 0) {
    container.innerHTML = '<div class="empty-state"><span class="empty-icon">🔒</span>MCQs for this day coming soon!</div>';
    return;
  }

  day.mcqs.forEach((q, qi) => {
    const key = `${d}-${qi}`;
    const answered = state.answers[key];

    const card = document.createElement('div');
    card.className = 'mcq-card' + (answered !== undefined ? (answered === q.ans ? ' answered-correct' : ' answered-wrong') : '');
    card.id = `mcq-${d}-${qi}`;

    const optionsHtml = q.opts.map((opt, oi) => {
      let cls = '';
      if (answered !== undefined) {
        if (oi === q.ans) cls = 'correct';
        else if (oi === answered && answered !== q.ans) cls = 'wrong';
      }
      return `<button class="option ${cls}" onclick="answerQ(${d},${qi},${oi})" ${answered !== undefined ? 'disabled' : ''}>
        <span class="opt-letter">${String.fromCharCode(65+oi)}</span>${opt}
      </button>`;
    }).join('');

    const expCls = answered !== undefined ? 'show' + (answered !== q.ans ? ' wrong-exp' : '') : '';
    card.innerHTML = `
      <div class="q-num">Q${qi+1} of ${day.mcqs.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optionsHtml}</div>
      <div class="explanation ${expCls}">
        <div class="exp-label">${answered !== undefined ? (answered === q.ans ? '✅ Correct!' : '❌ Incorrect') : ''}</div>
        ${q.exp}
      </div>`;
    container.appendChild(card);
  });

  document.getElementById('mcqResult').innerHTML = '';
}

function answerQ(d, qi, chosen) {
  const key = `${d}-${qi}`;
  if (state.answers[key] !== undefined) return;

  state.answers[key] = chosen;
  state.totalAnswered++;

  const q = CURRICULUM[d].mcqs[qi];
  const isCorrect = chosen === q.ans;

  // Track weak areas
  const topicName = CURRICULUM[d].topics[Math.min(qi, CURRICULUM[d].topics.length-1)]?.name || CURRICULUM[d].title;
  if (!isCorrect) {
    state.weakTopics[topicName] = (state.weakTopics[topicName] || 0) + 1;
  }

  saveState();
  renderMCQs(d);
  updateStats();
  showToast(isCorrect ? '✅ Correct!' : '❌ Wrong — check the explanation', isCorrect ? 'success' : 'error');
}

function checkMCQ() {
  const d = state.currentDay;
  const mcqs = CURRICULUM[d].mcqs;
  if (!mcqs || mcqs.length === 0) return;

  let correct = 0;
  mcqs.forEach((q, qi) => {
    const key = `${d}-${qi}`;
    if (state.answers[key] === q.ans) correct++;
  });

  const answered = mcqs.filter((_, qi) => state.answers[`${d}-${qi}`] !== undefined).length;
  const pct = Math.round((correct / mcqs.length) * 100);

  state.scores[d] = pct;
  saveState();
  updateStats();

  const cls = pct >= 80 ? 'great' : pct >= 60 ? 'ok' : 'bad';
  const msgs = { great: 'EXCELLENT — Exam Ready! 🎯', ok: 'DECENT — Review weak areas 📚', bad: 'NEEDS WORK — Restudy topics 🔄' };

  document.getElementById('mcqResult').innerHTML = `
    <div class="score-display">
      <div class="score-num ${cls}">${pct}%</div>
      <div class="score-msg">${correct}/${mcqs.length} CORRECT — ${msgs[cls]}</div>
    </div>`;
}

function resetMCQ() {
  const d = state.currentDay;
  CURRICULUM[d].mcqs.forEach((_, qi) => {
    delete state.answers[`${d}-${qi}`];
  });
  delete state.scores[d];
  saveState();
  renderMCQs(d);
  document.getElementById('mcqResult').innerHTML = '';
  showToast('Quiz reset!', '');
}

// ─────────────────────────────────────────────
// WEAK AREAS
// ─────────────────────────────────────────────
function renderWeakAreas() {
  const container = document.getElementById('weakList');
  const weak = Object.entries(state.weakTopics).sort((a,b) => b[1]-a[1]);

  if (weak.length === 0) {
    container.innerHTML = '<div class="empty-state"><span class="empty-icon">✅</span>No weak areas tracked yet.<br>Answer MCQs to see your weak spots!</div>';
    return;
  }

  const maxVal = weak[0][1];
  container.innerHTML = weak.map(([topic, count]) => `
    <div class="weak-item">
      <div style="flex:1;min-width:0">
        <div style="font-size:.85rem;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${topic}</div>
        <div class="weak-bar-wrap"><div class="weak-bar" style="width:${(count/maxVal)*100}%"></div></div>
      </div>
      <div class="weak-pct" style="color:var(--danger)">${count} ✗</div>
    </div>`).join('');
}

// ─────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────
function updateStats() {
  document.getElementById('statDay').textContent = state.currentDay;

  const scores = Object.values(state.scores);
  document.getElementById('statScore').textContent = scores.length ? Math.max(...scores) + '%' : '—';
  document.getElementById('statAnswered').textContent = state.totalAnswered;
  document.getElementById('statWeak').textContent = Object.keys(state.weakTopics).length;
}

// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['learn','mcq','weak'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'weak') renderWeakAreas();
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────────
// START
// ─────────────────────────────────────────────
init();
</script>
</body>
